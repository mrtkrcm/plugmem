services:
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8000"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  plugmem:
    build: .
    ports:
      - "8080:8080"
    environment:
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CHROMA_MODE=http
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - PLUGMEM_API_KEY=${PLUGMEM_API_KEY:-dev-key}
    depends_on:
      chroma:
        condition: service_healthy
    healthcheck:
      test: python -c "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/v1/health')"
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5

volumes:
  chroma_data:
