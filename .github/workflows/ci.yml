name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install
        run: uv sync --frozen --extra dev
      - name: Lint types
        run: uv run mypy plugmem/
      - name: Run tests
        run: uv run pytest tests/ -q

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv build
      - name: Verify wheel installs and SPA assets are present
        run: |
          set -euo pipefail
          WHEEL=$(ls dist/plugmem-*.whl | head -n1)
          uv run --isolated --with "$WHEEL" python -c "
          import plugmem, pathlib
          from plugmem.api.app import create_app
          create_app()
          import plugmem.api as api_pkg
          static = pathlib.Path(api_pkg.__file__).parent / 'static' / 'inspector' / 'index.html'
          assert static.is_file(), f'inspector SPA missing from wheel: {static}'
          print('wheel ok:', plugmem.__version__)
          "
